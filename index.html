<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RDP – Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #1a3a5c; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; }
    .box { background: #fff; border-radius: 16px; padding: 44px 40px;
           max-width: 400px; width: 100%; box-shadow: 0 12px 40px rgba(0,0,0,.3); }
    .logo { color: #1a3a5c; font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
    .btn-login { background: #1a3a5c; border: none; font-weight: 600; padding: 10px; }
    .btn-login:hover { background: #14304f; }
    #msgErro { display: none; }
  </style>
</head>
<body>
  <div class="box">
    <div class="text-center mb-4">
      <i class="bi bi-file-earmark-text" style="font-size:3rem;color:#1a3a5c"></i>
      <div class="logo">RDP</div>
      <small class="text-muted">Relatório Diário de Programação</small>
    </div>

    <div id="msgErro" class="alert alert-danger py-2"></div>

    <div class="mb-3">
      <label class="form-label fw-semibold">E-mail</label>
      <input type="email" id="email" class="form-control" placeholder="seu@email.com" autofocus>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Senha</label>
      <input type="password" id="senha" class="form-control"
             placeholder="••••••••" onkeydown="if(event.key==='Enter')entrar()">
    </div>
    <button class="btn btn-login btn-primary w-100" onclick="entrar()">
      <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
    </button>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp }     from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
        from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import { getFirestore, doc, getDoc }
        from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { FIREBASE_CONFIG } from "./js/config.js";

    const app  = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // Já autenticado → vai para o app
    onAuthStateChanged(auth, async user => {
      if (!user) return;
      const snap = await getDoc(doc(db, "usuarios", user.uid));
      if (snap.exists() && snap.data().ativo === false) {
        auth.signOut(); return;
      }
      const role = snap.exists() ? snap.data().role : "user";
      location.href = role === "admin" ? "admin.html" : "app.html";
    });

    window.entrar = async () => {
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value;
      const msg   = document.getElementById("msgErro");
      msg.style.display = "none";
      try {
        const cred = await signInWithEmailAndPassword(auth, email, senha);
        // Verifica se ativo no Firestore
        const snap = await getDoc(doc(db, "usuarios", cred.user.uid));
        if (snap.exists() && snap.data().ativo === false) {
          await auth.signOut();
          msg.textContent = "Usuário desativado. Contate o administrador.";
          msg.style.display = "block";
          return;
        }
        const role = snap.exists() ? snap.data().role : "user";
        location.href = role === "admin" ? "admin.html" : "app.html";
      } catch (e) {
        msg.textContent = "E-mail ou senha incorretos.";
        msg.style.display = "block";
      }
    };
  </script>
</body>
</html>
