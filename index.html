<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RDP – Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --azul: #15385c;
      --azul-2: #0f2944;
      --card: #111827;
      --card-2: #1f2937;
      --texto: #f9fafb;
      --muted: #9ca3af;
      --borda: #374151;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(30, 64, 175, .28), transparent 35%),
        linear-gradient(135deg, #07111f, #102a45 55%, #07111f);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--texto);
      padding: 16px;
    }

    .box {
      background: linear-gradient(180deg, var(--card), var(--card-2));
      border: 1px solid var(--borda);
      border-radius: 18px;
      padding: 42px 38px;
      max-width: 410px;
      width: 100%;
      box-shadow: 0 18px 55px rgba(0,0,0,.45);
    }

    .logo {
      color: #ffffff;
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .subtitle {
      color: var(--muted);
    }

    .form-label {
      color: #e5e7eb;
    }

    .form-control {
      background: #0b1220;
      color: #ffffff;
      border: 1px solid #374151;
    }

    .form-control:focus {
      background: #0b1220;
      color: #ffffff;
      border-color: #60a5fa;
      box-shadow: 0 0 0 .2rem rgba(96,165,250,.18);
    }

    .form-control::placeholder {
      color: #6b7280;
    }

    .btn-login {
      background: var(--azul);
      border: none;
      font-weight: 700;
      padding: 11px;
    }

    .btn-login:hover {
      background: var(--azul-2);
    }

    .btn-login:disabled {
      opacity: .7;
      cursor: not-allowed;
    }

    #msgErro {
      display: none;
      font-size: .88rem;
    }

    .small-help {
      color: var(--muted);
      font-size: .78rem;
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="text-center mb-4">
      <i class="bi bi-file-earmark-text" style="font-size:3rem;color:#93c5fd"></i>
      <div class="logo">RDP</div>
      <small class="subtitle">Relatório Diário de Programação</small>
    </div>

    <div id="msgErro" class="alert alert-danger py-2"></div>

    <div class="mb-3">
      <label class="form-label fw-semibold">E-mail</label>
      <input type="email" id="email" class="form-control" placeholder="seu@email.com" autocomplete="username" autofocus>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold">Senha</label>
      <input type="password" id="senha" class="form-control"
             placeholder="••••••••"
             autocomplete="current-password"
             onkeydown="if(event.key === 'Enter') entrar()">
    </div>

    <button id="btnEntrar" class="btn btn-login btn-primary w-100" onclick="entrar()">
      <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
    </button>

    <div class="small-help">
      Acesso permitido somente para usuários cadastrados e ativos.
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";

    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

    import {
      getFirestore,
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    import { FIREBASE_CONFIG } from "./js/config.js";

    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const emailEl = document.getElementById("email");
    const senhaEl = document.getElementById("senha");
    const msg = document.getElementById("msgErro");
    const btn = document.getElementById("btnEntrar");

    function mostrarErro(texto) {
      msg.textContent = texto;
      msg.style.display = "block";
    }

    function limparErro() {
      msg.textContent = "";
      msg.style.display = "none";
    }

    function setCarregando(status) {
      btn.disabled = status;
      btn.innerHTML = status
        ? `<span class="spinner-border spinner-border-sm me-1"></span> Entrando...`
        : `<i class="bi bi-box-arrow-in-right me-1"></i> Entrar`;
    }

    async function buscarPerfilUsuario(user) {
      const ref = doc(db, "usuarios", user.uid);
      const snap = await getDoc(ref);

      if (!snap.exists()) {
        await signOut(auth);
        throw {
          code: "app/usuario-sem-perfil",
          message: "Usuário autenticado, mas não existe cadastro dele na coleção usuarios."
        };
      }

      const dados = snap.data();

      if (dados.ativo === false) {
        await signOut(auth);
        throw {
          code: "app/usuario-desativado",
          message: "Usuário desativado. Contate o administrador."
        };
      }

      return dados;
    }

    async function redirecionarUsuario(user) {
      const perfil = await buscarPerfilUsuario(user);
      const role = perfil.role || "user";

      if (role === "admin") {
        location.href = "admin.html";
      } else {
        location.href = "app.html";
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) return;

      try {
        await redirecionarUsuario(user);
      } catch (e) {
        console.error("ERRO AO VALIDAR USUÁRIO LOGADO:", e);
        mostrarErro(traduzirErro(e));
      }
    });

    function traduzirErro(e) {
      const code = e?.code || "";
      const message = e?.message || "";

      if (code === "auth/invalid-credential") {
        return "E-mail ou senha incorretos, ou o usuário não existe no Firebase Authentication.";
      }

      if (code === "auth/user-not-found") {
        return "Usuário não existe no Firebase Authentication.";
      }

      if (code === "auth/wrong-password") {
        return "Senha incorreta.";
      }

      if (code === "auth/invalid-email") {
        return "E-mail inválido.";
      }

      if (code === "auth/missing-password") {
        return "Digite a senha.";
      }

      if (code === "auth/operation-not-allowed") {
        return "Login por e-mail/senha não está habilitado no Firebase Authentication.";
      }

      if (code === "permission-denied") {
        return "Login autenticou, mas o Firestore bloqueou a leitura do usuário. Verifique as regras.";
      }

      if (code === "app/usuario-sem-perfil") {
        return "Usuário existe no Authentication, mas não existe na coleção usuarios do Firestore.";
      }

      if (code === "app/usuario-desativado") {
        return "Usuário desativado. Contate o administrador.";
      }

      if (code === "unavailable") {
        return "Firebase indisponível ou problema de conexão.";
      }

      return `${code || "erro"} - ${message || "Erro desconhecido ao fazer login."}`;
    }

    window.entrar = async function() {
      limparErro();

      const email = emailEl.value.trim();
      const senha = senhaEl.value;

      if (!email) {
        mostrarErro("Digite o e-mail.");
        emailEl.focus();
        return;
      }

      if (!senha) {
        mostrarErro("Digite a senha.");
        senhaEl.focus();
        return;
      }

      setCarregando(true);

      try {
        const cred = await signInWithEmailAndPassword(auth, email, senha);
        await redirecionarUsuario(cred.user);
      } catch (e) {
        console.error("ERRO LOGIN:", e.code, e.message, e);
        mostrarErro(traduzirErro(e));
      } finally {
        setCarregando(false);
      }
    };
  </script>
</body>
</html>
